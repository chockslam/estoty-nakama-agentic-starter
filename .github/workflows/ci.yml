name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test ./...

      - name: Run unit tests on pinned plugin-builder toolchain
        run: docker run --rm -v "$PWD":/backend -w /backend heroiclabs/nakama-pluginbuilder:3.37.0 test ./...

      - name: Build Docker stack
        run: docker compose build
